name: eduhub
description: A Flutter web project with Firebase
publish_to: 'none'

environment:
  sdk: ">=3.1.0 <4.0.0"
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter

intl: ^0.19.0
  # Consistent stable versions
  firebase_core: ^3.10.1
  cloud_firestore: ^5.6.1
  firebase_auth: ^5.4.4
  firebase_storage: ^12.4.10

  cupertino_icons: ^1.0.5
  image_picker: ^1.0.7
  path_provider: ^2.1.5
  url_launcher: ^6.2.5
  intl: ^0.20.2
  pdf: ^3.10.8
  printing: ^5.12.0
  file_picker: ^10.3.10
  http: ^1.6.0
  syncfusion_flutter_pdfviewer: ^28.1.33

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/role_bg.jpg
